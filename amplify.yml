version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - node -v
        - npm install --frozen-lockfile || npm install
    build:
      commands:
        - npx expo export
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
